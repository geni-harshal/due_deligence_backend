# ============================================================
# SPRING BOOT CONFIGURATION
# ============================================================
spring:
  application:
    name: EntityCheck Backend
  
  # Profiles to include
  profiles:
    include:
      - comprehensive
  
  # ============================================================
  # DATABASE CONFIGURATION
  # ============================================================
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/entitycheck}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  
  # ============================================================
  # JPA / HIBERNATE CONFIGURATION
  # Using JPA ddl-auto instead of Flyway for schema management
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ============================================================
  # FLYWAY DISABLED
  # ============================================================
  flyway:
    enabled: false

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on-param

# ============================================================
# SECURITY CONFIGURATION
# ============================================================
security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long-for-hmac}
    expiration: ${JWT_EXPIRATION:86400000}

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging:
  level:
    org.springframework.security: DEBUG
    com.entitycheck: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ============================================================
# ACTUATOR & MONITORING
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
          
