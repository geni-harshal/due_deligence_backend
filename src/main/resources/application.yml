server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/entitycheck}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long-for-hmac}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

logging:
  level:
    org.springframework.security: DEBUG
    com.entitycheck: DEBUG

probe42:
  base-url: ${PROBE42_BASE_URL:https://api.probe42.in}
  api-key: ${PROBE42_API_KEY:yMyK3vWVqe6l5qWqzFflg4TGxLS4Ll9XaobXUZjy}
  api-version: ${PROBE42_API_VERSION:1.3}

support:
  contact-number: ${SUPPORT_CONTACT_NUMBER:+91 9876543210}
